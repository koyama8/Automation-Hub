<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cypress QA Lab automation robot icon">
  <defs>
    <radialGradient id="disc" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 506) rotate(90) scale(390)">
      <stop offset="0" stop-color="#172040"/>
      <stop offset="0.55" stop-color="#11152B"/>
      <stop offset="1" stop-color="#050814"/>
    </radialGradient>
    <linearGradient id="cyanStroke" x1="154" y1="196" x2="862" y2="862" gradientUnits="userSpaceOnUse">
      <stop stop-color="#52FFF3"/>
      <stop offset="0.52" stop-color="#22E8D7"/>
      <stop offset="1" stop-color="#00BFAF"/>
    </linearGradient>
    <linearGradient id="purpleStroke" x1="250" y1="225" x2="762" y2="804" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8E5BFF"/>
      <stop offset="1" stop-color="#5B2CD6"/>
    </linearGradient>
    <linearGradient id="robotShell" x1="310" y1="280" x2="704" y2="622" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.45" stop-color="#F3F5FF"/>
      <stop offset="1" stop-color="#BFC3FF"/>
    </linearGradient>
    <linearGradient id="robotShade" x1="334" y1="610" x2="698" y2="846" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.5" stop-color="#CACDFF"/>
      <stop offset="1" stop-color="#111730"/>
    </linearGradient>
    <linearGradient id="screen" x1="357" y1="328" x2="674" y2="575" gradientUnits="userSpaceOnUse">
      <stop stop-color="#151A33"/>
      <stop offset="1" stop-color="#060914"/>
    </linearGradient>
    <filter id="glowCyan" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#22F2E3" flood-opacity="0.9"/>
      <feDropShadow dx="0" dy="0" stdDeviation="28" flood-color="#16D7CC" flood-opacity="0.35"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="innerSoft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Transparent background: no purple rectangle -->

  <g filter="url(#softShadow)">
    <circle cx="512" cy="512" r="365" fill="url(#disc)"/>
  </g>

  <circle cx="512" cy="512" r="360" stroke="url(#cyanStroke)" stroke-width="22" filter="url(#glowCyan)"/>
  <path d="M256 600 C254 442 356 277 514 256 C622 242 724 295 782 384" stroke="url(#purpleStroke)" stroke-width="20" stroke-linecap="round"/>
  <path d="M769 609 C741 746 623 824 493 819 C398 816 305 767 260 690" stroke="url(#purpleStroke)" stroke-width="20" stroke-linecap="round" opacity="0.85"/>
  <path d="M174 622 H242 C256 622 266 612 266 598 V510" stroke="url(#cyanStroke)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowCyan)"/>
  <path d="M850 622 H782 C768 622 758 612 758 598 V510" stroke="url(#cyanStroke)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowCyan)"/>

  <circle cx="512" cy="159" r="28" fill="#45F4E8" filter="url(#glowCyan)"/>
  <circle cx="160" cy="512" r="28" fill="#45F4E8" filter="url(#glowCyan)"/>
  <circle cx="864" cy="512" r="28" fill="#45F4E8" filter="url(#glowCyan)"/>

  <path d="M512 187 V250" stroke="url(#cyanStroke)" stroke-width="18" stroke-linecap="round" filter="url(#glowCyan)"/>

  <rect x="450" y="245" width="124" height="48" rx="24" fill="#141A36" opacity="0.95"/>

  <g filter="url(#innerSoft)">
    <rect x="260" y="401" width="86" height="170" rx="38" fill="url(#robotShell)"/>
    <rect x="678" y="401" width="86" height="170" rx="38" fill="url(#robotShell)"/>
    <rect x="246" y="438" width="38" height="98" rx="19" fill="url(#cyanStroke)" filter="url(#glowCyan)"/>
    <rect x="740" y="438" width="38" height="98" rx="19" fill="url(#cyanStroke)" filter="url(#glowCyan)"/>
  </g>

  <g filter="url(#innerSoft)">
    <rect x="316" y="277" width="392" height="318" rx="90" fill="url(#robotShell)"/>
    <rect x="355" y="331" width="314" height="202" rx="66" fill="url(#screen)"/>
    <rect x="376" y="352" width="272" height="160" rx="53" fill="#0A0E1D" opacity="0.55"/>
  </g>

  <path d="M407 445 C412 414 439 395 470 402 C495 407 510 427 513 454" stroke="url(#cyanStroke)" stroke-width="24" stroke-linecap="round" filter="url(#glowCyan)"/>
  <path d="M552 454 C556 424 581 404 612 401 C640 398 662 415 672 445" stroke="url(#cyanStroke)" stroke-width="24" stroke-linecap="round" filter="url(#glowCyan)"/>
  <path d="M471 498 C497 530 529 530 554 499" stroke="url(#cyanStroke)" stroke-width="24" stroke-linecap="round" filter="url(#glowCyan)"/>

  <path d="M318 788 C344 674 411 633 512 633 C613 633 680 674 706 788" fill="url(#robotShade)"/>
  <path d="M389 748 C421 685 458 660 512 660 C566 660 603 685 635 748" fill="#080C1B"/>

  <circle cx="512" cy="743" r="56" fill="#121733" stroke="url(#cyanStroke)" stroke-width="14" filter="url(#glowCyan)"/>
  <path d="M487 742 L507 762 L544 723" stroke="url(#cyanStroke)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowCyan)"/>
  <circle cx="601" cy="777" r="12" fill="#31F4E4" filter="url(#glowCyan)"/>
  <circle cx="641" cy="777" r="12" fill="#31F4E4" filter="url(#glowCyan)"/>
</svg>
