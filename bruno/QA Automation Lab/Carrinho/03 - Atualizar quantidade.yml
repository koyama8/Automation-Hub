info:
  name: Atualizar quantidade
  type: http
  seq: 3

http:
  method: PATCH
  url: http://localhost:3030/api/cart/items/{{cartItemId}}
  body:
    type: json
    data: |-
      {
        "quantity": 3
      }
  auth:
    type: bearer
    token: '{{authToken}}'

runtime:
  scripts:
    - type: tests
      code: |-
        test("deve atualizar quantidade", () => {
          expect(res.getStatus()).to.equal(200);
          expect(res.getBody().data.subtotalCents).to.be.greaterThan(0);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Atualiza quantidade do cartItemId.
