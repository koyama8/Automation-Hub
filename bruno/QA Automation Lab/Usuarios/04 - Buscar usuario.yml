info:
  name: Buscar usuario
  type: http
  seq: 4

http:
  method: GET
  url: http://localhost:3030/api/users/{{userId}}
  auth:
    type: bearer
    token: '{{authToken}}'

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Busca o usuario definido em userId. Esperado 200 OK.
