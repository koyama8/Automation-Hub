info:
  name: Atualizar usuario
  type: http
  seq: 5

http:
  method: PUT
  url: http://localhost:3030/api/users/{{userId}}
  body:
    type: json
    data: |-
      {
        "name": "Usuario Bruno Atualizado",
        "email": "usuario.bruno@gmail.com",
        "password": "Bruno@456"
      }
  auth:
    type: bearer
    token: '{{authToken}}'

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Atualiza nome, email e senha. Esperado 200 OK.
