info:
  name: Inativar usuario
  type: http
  seq: 6

http:
  method: PATCH
  url: http://localhost:3030/api/users/{{userId}}/status
  body:
    type: json
    data: |-
      {
        "active": false
      }
  auth:
    type: bearer
    token: '{{authToken}}'

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Inativa o usuario. Esperado 200 OK.
