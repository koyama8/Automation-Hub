info:
  name: Criar segundo pedido para limite
  type: http
  seq: 16

http:
  method: POST
  url: http://localhost:3030/api/orders
  body:
    type: json
    data: |-
      {
        "clientId": "{{clientId}}",
        "items": [
          {
            "productId": "{{productId}}",
            "quantity": 1
          }
        ],
        "notes": "Segundo pedido para validar limite atingido"
      }
  auth:
    type: bearer
    token: '{{authToken}}'

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (res.getStatus() === 201 && body?.data?.id) bru.setVar("secondLimitedOrderId", body.data.id);
    - type: tests
      code: |-
        test("deve criar segundo pedido para limite", () => {
          expect(res.getStatus()).to.equal(201);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Cria outro pedido sem cupom para testar usageLimit atingido.
