info:
  name: Inativar cliente
  type: http
  seq: 6

http:
  method: PATCH
  url: http://localhost:3030/api/clients/{{clientId}}/status
  body:
    type: json
    data: |-
      {
        "status": "inactive"
      }
  auth:
    type: bearer
    token: '{{authToken}}'

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Inativa o cliente. Esperado 200 OK.
