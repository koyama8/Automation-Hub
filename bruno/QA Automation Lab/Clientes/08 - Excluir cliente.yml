info:
  name: Excluir cliente por ID
  type: http
  seq: 8

http:
  method: DELETE
  url: http://localhost:3030/api/clients/{{clientId}}
  auth:
    type: bearer
    token: '{{authToken}}'

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Exclui o cliente definido em clientId. Esperado 200 OK.
