info:
  name: Tamanho maximo 400
  type: http
  seq: 11

http:
  method: POST
  url: http://localhost:3030/api/evidences
  body:
    type: json
    data: |-
      {
        "entityType": "client",
        "clientId": "{{clientId}}",
        "title": "Arquivo acima de 1MB",
        "fileName": "arquivo-grande.txt",
        "mimeType": "text/plain",
        "fileBase64": "",
        "notes": "Deve falhar porque o arquivo decodificado passa de 1MB"
      }
  auth:
    type: bearer
    token: '{{authToken}}'

runtime:
  scripts:
    - type: tests
      code: |-
        test("deve rejeitar arquivo maior que 1MB", () => {
          expect(res.getStatus()).to.equal(400);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Envia arquivo text/plain com 1MB + 1 byte para validar limite maximo da API.

