info:
  name: Buscar evidencia por id
  type: http
  seq: 7

http:
  method: GET
  url: http://localhost:3030/api/evidences/{{evidenceId}}
  auth:
    type: bearer
    token: '{{authToken}}'

runtime:
  scripts:
    - type: tests
      code: |-
        test("deve buscar metadata da evidencia", () => {
          expect(res.getStatus()).to.equal(200);
          expect(res.getBody().data.id).to.exist;
          expect(res.getBody().data.fileBase64).to.not.exist;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Busca metadata sem retornar o conteudo do arquivo.

