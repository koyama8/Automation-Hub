info:
  name: Listar evidencias do cliente
  type: http
  seq: 5

http:
  method: GET
  url: http://localhost:3030/api/evidences?entityType=client&clientId={{clientId}}
  auth:
    type: bearer
    token: '{{authToken}}'

runtime:
  scripts:
    - type: tests
      code: |-
        test("deve filtrar evidencias por cliente", () => {
          expect(res.getStatus()).to.equal(200);
          expect(res.getBody()).to.be.an("array");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Filtra evidencias pelo clientId salvo.

