http:
  method: PATCH
  url: http://localhost:3030/api/orders/{{orderId}}/status
  body:
    type: json
    data: |-
      {
        "status": "processing"
      }
  auth:
    type: bearer
    token: '{{authToken}}'

runtime:
  scripts:
